<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Drive - Cloud Storage</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-animation"><div class="gradient-bg"></div></div>
    <div class="container">
        <!-- Auth Section -->
        <div id="authSection" class="auth-section">
            <div class="auth-card glass-card">
                <div class="logo"><i class="fas fa-cloud-upload-alt"></i><h1>Pocket Drive</h1></div>
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="showAuthTab('login')">Login</button>
                    <button class="tab-btn" onclick="showAuthTab('signup')">Sign Up</button>
                </div>
                <div id="loginForm" class="auth-form active">
                    <form onsubmit="login(event)">
                        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email" required></div>
                        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Password" required><i class="fas fa-eye-slash password-toggle" onclick="window.togglePassword('loginPassword', this)"></i></div>
                        <button type="submit" class="btn-primary">Login</button>
                        <a href="#" onclick="showForgotPassword()" class="forgot-link">Forgot Password?</a>
                    </form>
                </div>
                <div id="signupForm" class="auth-form">
                    <form onsubmit="signup(event)">
                        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="signupEmail" placeholder="Email" required></div>
                        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="signupPassword" placeholder="Password (min 6)" required><i class="fas fa-eye-slash password-toggle" onclick="window.togglePassword('signupPassword', this)"></i></div>
                        <div class="input-group"><i class="fas fa-check-circle"></i><input type="password" id="signupConfirmPassword" placeholder="Confirm password" required><i class="fas fa-eye-slash password-toggle" onclick="window.togglePassword('signupConfirmPassword', this)"></i></div>
                        <div id="passwordMatchMsg" class="password-match-msg"></div>
                        <button type="submit" class="btn-primary">Create Account</button>
                    </form>
                </div>
                <div id="authMessage" class="message"></div>
            </div>
        </div>

        <!-- Modals -->
        <div id="forgotModal" class="modal"><div class="modal-content glass-card"><span class="close" onclick="closeForgotModal()">&times;</span><h3>Reset Password</h3><p>Enter your email</p><input type="email" id="forgotEmail" class="modal-input"><button onclick="sendResetLink()" class="btn-primary">Send</button><div id="forgotMessage" class="message"></div></div></div>
        <div id="resetModal" class="modal"><div class="modal-content glass-card"><span class="close" onclick="closeResetModal()">&times;</span><h3>New Password</h3><input type="password" id="resetNewPassword" placeholder="New password" class="modal-input"><input type="password" id="resetConfirmPassword" placeholder="Confirm" class="modal-input"><button onclick="submitResetPassword()" class="btn-primary">Reset</button><div id="resetMessage" class="message"></div></div></div>
        <div id="changePasswordModal" class="modal"><div class="modal-content glass-card"><span class="close" onclick="closeChangePasswordModal()">&times;</span><h3>Change Password</h3><input type="password" id="currentPassword" placeholder="Current password" class="modal-input"><input type="password" id="newPassword" placeholder="New password (min 6)" class="modal-input"><button onclick="submitChangePassword()" class="btn-primary">Update</button><div id="changePasswordMessage" class="message"></div></div></div>
        <div id="trashModal" class="modal"><div class="modal-content glass-card trash-modal"><span class="close" onclick="closeTrashModal()">&times;</span><h3><i class="fas fa-trash-alt"></i> Trash</h3><div id="trashList" class="trash-container"></div><div style="margin-top:15px; text-align:center;"><button onclick="closeTrashModal()" class="btn-primary btn-small">Close</button></div></div></div>
        <div id="previewModal" class="modal"><div class="modal-content glass-card preview-modal"><span class="close" onclick="closePreviewModal()">&times;</span><h3 id="previewFileName">Preview</h3><div id="previewContent" class="preview-content"></div></div></div>

        <!-- Dashboard -->
        <div id="dashboardSection" class="dashboard-section" style="display: none;">
            <div class="dashboard-header glass-card">
                <div class="logo-small"><i class="fas fa-cloud-upload-alt"></i><h2>Pocket Drive</h2></div>
                <div class="user-info">
                    <span><i class="fas fa-user-circle"></i> <span id="userEmail"></span></span>
                    <button onclick="showTrashView()" class="icon-btn"><i class="fas fa-trash-alt"></i></button>
                    <button onclick="changePasswordDialog()" class="icon-btn"><i class="fas fa-key"></i></button>
                    <button onclick="logout()" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div class="dashboard-content">
                <div class="upload-area glass-card" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i><p>Click to upload files</p><small>Max 100MB</small>
                    <input type="file" id="fileInput" style="display: none" onchange="uploadFile(this)">
                </div>
                <div id="uploadProgressContainer" class="progress-container" style="display: none;"><div class="progress-bar-wrapper"><div id="uploadProgressBar" class="progress-bar"></div></div><p id="uploadProgressPercent">0%</p></div>
                <div class="view-controls"><button class="view-btn active" onclick="setView('grid')"><i class="fas fa-th-large"></i> Grid</button><button class="view-btn" onclick="setView('list')"><i class="fas fa-list"></i> List</button><button onclick="loadFiles()" class="view-btn"><i class="fas fa-sync-alt"></i> Refresh</button></div>
                <div id="fileList" class="file-container grid-view"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
